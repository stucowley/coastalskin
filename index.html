<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coastal Skin + Beauty</title>
  </head>
  <body>
    <header class="site-header" data-header>
      <div class="container site-header__inner">
        <a
          href="/"
          class="site-header__brand"
          aria-label="Coastal Skin & Beauty home"
        >
          <img
            src="/src/assets/images/logo.svg"
            alt="Coastal Skin & Beauty"
            class="site-header__logo"
          />
        </a>

        <button
          class="site-header__toggle"
          type="button"
          aria-controls="primary-navigation"
          aria-expanded="false"
          data-nav-toggle
        >
          <span class="sr-only">Toggle menu</span>
          <span class="site-header__toggle-icon" aria-hidden="true"></span>
        </button>

        <nav
          id="primary-navigation"
          class="site-header__nav"
          aria-label="Primary navigation"
          data-primary-nav
          data-visible="false"
        >
          <ul class="site-header__nav-list">
            <li><a href="/">Home</a></li>
            <li><a href="about-us.html">About us</a></li>
            <li><a href="treatments.html">Treatments</a></li>
            <li><a href="contact-us.html">Contact us</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <section
      class="hero"
      data-hero-variant="home"
      data-parallax
      data-parallax-strength="-160"
      style="
        --hero-bg-mobile: url('/src/assets/images/home-page-hero-mobile.jpg');
        --hero-bg-desktop: url('/src/assets/images/home-page-hero-desktop.jpg');
      "
    >
      <div class="container hero__inner">
        <div class="hero__content flow">
          <p class="hero__eyebrow">Goolwa's leading salon</p>

          <h1 class="hero__heading">
            Advanced skin treatments and relaxing beauty therapy.
          </h1>

          <div class="hero__actions">
            <a
              href="#"
              class="btn"
              data-btn-style="solid"
              data-btn-theme="primary"
            >
              Book now
            </a>

            <a
              href="treatments.html"
              class="btn"
              data-btn-style="outline"
              data-btn-theme="on-dark"
            >
              View treatments
            </a>
          </div>
        </div>
      </div>
    </section>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
