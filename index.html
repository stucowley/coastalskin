<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coastal Skin &plus; Beauty Goolwa</title>
  </head>
  <body>
    <header class="site-header" data-header>
      <div class="container site-header__inner">
        <a
          class="site-header__brand"
          href="/"
          aria-label="Coastal Skin &amp; Beauty home"
        >
          <img
            class="site-header__logo"
            src="/src/assets/images/logo-light.svg"
            alt="Coastal Skin &amp; Beauty"
            data-header-logo
            data-logo-light="/src/assets/images/logo-light.svg"
            data-logo-primary="/src/assets/images/logo-primary.svg"
          />

          <span class="sr-only">Coastal Skin &amp; Beauty</span>

        <button
          class="site-header__toggle"
          type="button"
          data-nav-toggle
          aria-controls="primary-navigation"

          <span class="sr-only">Toggle menu</span>
          <span class="site-header__toggle-icon" aria-hidden="true"></span>
        </button>

        <nav
          class="site-header__nav"
          id="primary-navigation"
          data-primary-nav
          data-visible="false"
          aria-label="Primary navigation"
        >
          <ul class="site-header__nav-links">
            <li><a class="active" href="/">Home</a></li>
            <li><a href="about-us.html">About us</a></li>
            <li><a href="treatments.html">Treatments</a></li>
